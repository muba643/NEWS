name: Auto-post news to Telegram

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run news bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node index.js

      - name: Save seen.json back to repo
        run: |
          git config user.name "al-huda-news-bot"
          git config user.email "bot@users.noreply.github.com"
          git add seen.json news-feed.json
          git diff --quiet --cached || git commit -m "Update seen items [skip ci]"
          git push
